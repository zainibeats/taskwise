# Human-facing test environment — no npm required on the host.
#
# Usage:
#   1. cp .env.test .env.test.local        # fill in your settings
#   2. docker compose -f docker-compose.test.yml --env-file .env.test.local up --build
#   3. Open http://localhost:9002
#
# LM Studio (recommended for local testing):
#   - Start LM Studio on the host and load a model
#   - Enable the local server (default port 1234)
#   - Set AI_PROVIDER=lm_studio in your .env.test.local (already the default)
#
# On Linux  : host networking is used, so localhost:1234 reaches the host directly.
# On Mac/Win: replace LM_STUDIO_BASE_URL with http://host.docker.internal:1234/v1

services:
  taskwise-test:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    network_mode: host
    env_file:
      - .env.test.local
    environment:
      - NODE_ENV=production
    container_name: taskwise-test
    volumes:
      - taskwise-test-data:/app/data
      - taskwise-test-logs:/app/logs
      - /app/node_modules

volumes:
  taskwise-test-data:
    driver: local
  taskwise-test-logs:
    driver: local
